<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Elemental Clash</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070a14;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
#help{position:fixed;left:12px;top:12px;padding:10px 13px;border:1px solid #ffffff2a;border-radius:14px;background:#050812bb;color:#fff;font-size:13px;line-height:1.55;backdrop-filter:blur(10px);z-index:4}
#touch{position:fixed;inset:0;pointer-events:none;z-index:5}
.pad,.actions{position:absolute;bottom:max(18px,env(safe-area-inset-bottom));display:flex;gap:12px;pointer-events:auto}
.pad{left:18px}.actions{right:18px}
.btn{width:68px;height:68px;border-radius:50%;border:1px solid #ffffff55;background:#0009;color:#fff;font-size:27px;font-weight:900;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none;box-shadow:0 8px 24px #0009}
.btn.action{width:80px;height:80px;font-size:18px}
#result{display:none;position:fixed;inset:0;z-index:8;align-items:center;justify-content:center;background:#050812b8}
#resultBox{padding:28px 40px;border-radius:24px;border:1px solid #ffffff33;background:#10172aee;text-align:center;box-shadow:0 30px 100px #000}
#resultBox h1{margin:0 0 14px;font-size:clamp(36px,7vw,72px)}
#resultBox button{padding:13px 28px;border:0;border-radius:14px;background:linear-gradient(135deg,#725cff,#31c7ff);color:#fff;font-size:18px;font-weight:900}

@media (hover:hover) and (pointer:fine){#touch{display:none}}
@media (pointer:coarse){
  #help{font-size:12px;max-width:74vw}
  .pad,.actions{bottom:max(14px,env(safe-area-inset-bottom))}
}
@media (max-width:720px){
  .btn{width:60px;height:60px;font-size:24px}
  .btn.action{width:70px;height:70px;font-size:16px}
  .pad,.actions{gap:8px}
  .pad{left:10px}.actions{right:10px}
}

</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="help">
1P：A / D 移動・W ジャンプ・K 通常攻撃・L 必殺技<br>
R：リスタート
</div>

<div id="touch">
  <div class="pad">
    <div class="btn" data-key="a">◀</div>
    <div class="btn" data-key="d">▶</div>
    <div class="btn" data-key="w">▲</div>
  </div>
  <div class="actions">
    <div class="btn action" data-key="k">攻撃</div>
    <div class="btn action" data-key="l">必殺</div>
  </div>
</div>

<div id="result">
  <div id="resultBox">
    <h1 id="resultText"></h1>
    <button id="restartBtn">もう一度</button>
  </div>
</div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const result = document.getElementById('result');
const resultText = document.getElementById('resultText');

let W = innerWidth, H = innerHeight, DPR = devicePixelRatio || 1;
let time = 0, shake = 0, state = 'play';
let particles = [], projectiles = [], platforms = [];
let p1, p2;

const keys = Object.create(null);
const pressed = Object.create(null);

const chars = [
  {
    name:'イグナ', title:'紅蓮の剣姫', element:'炎',
    color:'#ff5a42', dark:'#761927', accent:'#ffd06c',
    speed:.88, jump:13.8, power:1.13, special:'fire'
  },
  {
    name:'フロスト', title:'白銀の魔導士', element:'氷',
    color:'#70dcff', dark:'#164f78', accent:'#e9fbff',
    speed:.74, jump:13.2, power:.96, special:'ice'
  },
  {
    name:'ヴォルト', title:'雷迅の忍', element:'雷',
    color:'#ffe45b', dark:'#6d4d13', accent:'#ffffff',
    speed:1.08, jump:14.3, power:.91, special:'dash'
  },
  {
    name:'ガイア', title:'森羅の守護騎士', element:'自然',
    color:'#72d46d', dark:'#285c30', accent:'#d2ffa8',
    speed:.65, jump:12.5, power:1.30, special:'vine'
  }
];

function resize(){
  W = innerWidth; H = innerHeight; DPR = devicePixelRatio || 1;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildStage();
}
addEventListener('resize', resize);

addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (!keys[k]) pressed[k] = true;
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if (k === 'r') startGame();
});
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
addEventListener('blur', () => {
  for (const k in keys) keys[k] = false;
});

document.querySelectorAll('.btn').forEach(btn => {
  const k = btn.dataset.key;
  const down = e => {
    e.preventDefault();
    if (!keys[k]) pressed[k] = true;
    keys[k] = true;
    btn.style.transform = 'scale(.9)';
    btn.style.background = '#ffffff35';
  };
  const up = e => {
    e.preventDefault();
    keys[k] = false;
    btn.style.transform = '';
    btn.style.background = '';
  };
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointercancel', up);
  btn.addEventListener('pointerleave', up);
});

document.getElementById('restartBtn').onclick = startGame;

function consume(k){
  if (pressed[k]) {
    delete pressed[k];
    return true;
  }
  return false;
}
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function overlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function roundRect(x,y,w,h,r,fill=true){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  fill ? ctx.fill() : ctx.stroke();
}
function burst(x,y,n,color){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22+Math.random()*28,color,size:3+Math.random()*4});
  }
}
function glowOrb(x,y,r,color){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=r*1.8;
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function buildStage(){
  platforms = [
    {x:W*.15,y:H*.72,w:W*.70,h:24},
    {x:W*.30,y:H*.52,w:W*.16,h:17},
    {x:W*.54,y:H*.52,w:W*.16,h:17}
  ];
}

class Fighter{
  constructor(x,charIndex,controls,cpu=false,facing=1){
    this.spawnX=x; this.charIndex=charIndex; this.char=chars[charIndex];
    this.controls=controls; this.cpu=cpu; this.baseFacing=facing;
    this.resetAll();
  }
  resetAll(){ this.stocks=3; this.percent=0; this.respawn(); }
  respawn(){
    this.x=this.spawnX; this.y=H*.28; this.vx=0; this.vy=0;
    this.w=56; this.h=74; this.facing=this.baseFacing;
    this.onGround=false; this.jumps=2; this.attackT=0; this.cool=0;
    this.specialCool=0; this.inv=100; this.stun=0; this.slow=0;
  }
  input(op){
    if(this.cpu){
      const dx=op.x-this.x;
      return {
        left:dx<-48, right:dx>48,
        jump:(this.y>op.y+70)||(this.onGround&&Math.random()<.006),
        attack:Math.abs(dx)<84&&Math.abs(op.y-this.y)<85&&Math.random()<.11,
        special:Math.abs(dx)>105&&Math.abs(dx)<390&&Math.random()<.017
      };
    }
    const c=this.controls;
    return {
      left:keys[c.left], right:keys[c.right],
      jump:consume(c.jump), attack:consume(c.attack), special:consume(c.special)
    };
  }
  update(op){
    if(this.stun>0){ this.stun--; this.physics(); return; }
    const i=this.input(op);
    const spd=this.char.speed*(this.slow>0?.55:1);

    if(i.left){ this.vx-=.84*spd; this.facing=-1; }
    if(i.right){ this.vx+=.84*spd; this.facing=1; }
    if(!i.left&&!i.right) this.vx*=this.onGround?.78:.985;
    this.vx=clamp(this.vx,-8.4*spd,8.4*spd);

    if(i.jump&&this.jumps>0){
      this.vy=-(this.jumps===2?this.char.jump:this.char.jump*.84);
      this.jumps--; this.onGround=false;
      burst(this.x+28,this.y+this.h,9,'#ffffff');
    }
    if(i.attack&&this.cool<=0){ this.attackT=13; this.cool=23; }
    if(i.special&&this.specialCool<=0){ this.useSpecial(); this.specialCool=90; }

    if(this.attackT>0){
      this.attackT--;
      if(this.attackT===7) this.tryHit(op);
    }
    if(this.cool>0)this.cool--;
    if(this.specialCool>0)this.specialCool--;
    if(this.inv>0)this.inv--;
    if(this.slow>0)this.slow--;

    this.physics();
    if(this.x<-190||this.x>W+190||this.y>H+210||this.y<-280)this.ko(op);
  }
  physics(){
    this.vy+=.67; this.x+=this.vx; this.y+=this.vy; this.onGround=false;
    for(const p of platforms){
      if(this.vy>=0&&this.x+this.w>p.x&&this.x<p.x+p.w&&this.y+this.h>=p.y&&this.y+this.h<=p.y+32){
        this.y=p.y-this.h; this.vy=0; this.onGround=true; this.jumps=2;
      }
    }
  }
  tryHit(op){
    const reach=58;
    const hb={x:this.facing>0?this.x+this.w:this.x-reach,y:this.y+13,w:reach,h:48};
    if(overlap(hb,op)&&op.inv<=0){
      op.percent+=11*this.char.power;
      const force=6.5+op.percent*.075*this.char.power;
      op.vx=this.facing*force; op.vy=-5.3-op.percent*.025; op.stun=8;
      shake=8; burst(op.x+28,op.y+35,24,this.char.accent);
    }
  }
  useSpecial(){
    const type=this.char.special;
    if(type==='fire'){
      projectiles.push({type,owner:this,x:this.x+28+this.facing*32,y:this.y+31,vx:this.facing*8.5,vy:0,r:17,life:115,color:'#ff7935',damage:19,power:1.26});
    }else if(type==='ice'){
      projectiles.push({type,owner:this,x:this.x+28+this.facing*32,y:this.y+31,vx:this.facing*10,vy:0,r:13,life:100,color:'#c9f6ff',damage:13,power:1.0,slow:130});
    }else if(type==='dash'){
      this.vx=this.facing*17.5; this.vy=-1.4; this.attackT=10;
      burst(this.x+28,this.y+36,28,'#fff36b');
    }else{
      projectiles.push({type,owner:this,x:this.x+28+this.facing*42,y:H*.72-20,vx:this.facing*5.6,vy:0,r:21,life:78,color:'#80df73',damage:21,power:1.38});
    }
  }
  ko(op){
    this.stocks--;
    burst(clamp(this.x,0,W),clamp(this.y,0,H),52,this.char.color);
    shake=17;
    if(this.stocks<=0) endGame(op);
    else { this.percent=0; this.respawn(); }
  }
  draw(){
    ctx.save();
    if(this.inv>0&&Math.floor(this.inv/5)%2===0)ctx.globalAlpha=.35;
    ctx.translate(this.x,this.y);

    const attackProgress = this.attackT > 0 ? 1 - this.attackT / 13 : 0;
    const swing = this.attackT > 0
      ? Math.sin(Math.min(1, attackProgress) * Math.PI) * 1.75
      : 0;
    const bodyLean = this.attackT > 0 ? this.facing * swing * 2.2 : 0;

    // elemental aura
    ctx.globalAlpha*=.35;
    glowOrb(28,37,28+Math.sin(time*.08+this.charIndex)*3,this.char.color);
    ctx.globalAlpha=1;

    ctx.save();
    ctx.translate(bodyLean,0);

    // cape / back ornament
    ctx.fillStyle=this.char.dark;
    ctx.beginPath();
    if(this.facing>0){
      ctx.moveTo(12,24);ctx.lineTo(-3,45);ctx.lineTo(9,68);ctx.lineTo(24,52);
    }else{
      ctx.moveTo(44,24);ctx.lineTo(59,45);ctx.lineTo(47,68);ctx.lineTo(32,52);
    }
    ctx.closePath();ctx.fill();

    // legs
    ctx.fillStyle='#141927';
    roundRect(14,51,12,22,5); roundRect(31,51,12,22,5);

    // body armor
    ctx.shadowColor=this.char.color;ctx.shadowBlur=16;
    ctx.fillStyle=this.char.dark;roundRect(8,16,40,47,13);
    ctx.fillStyle=this.char.color;roundRect(12,12,32,45,11);
    ctx.shadowBlur=0;

    // chest emblem
    ctx.fillStyle=this.char.accent;
    ctx.beginPath();ctx.moveTo(28,24);ctx.lineTo(34,32);ctx.lineTo(28,40);ctx.lineTo(22,32);ctx.closePath();ctx.fill();

    // head
    ctx.fillStyle='#f3c7a5';roundRect(15,1,27,24,10);

    // hair / helmet
    if(this.charIndex===0){
      ctx.fillStyle='#651522';
      ctx.beginPath();ctx.moveTo(14,8);ctx.lineTo(18,-8);ctx.lineTo(25,2);ctx.lineTo(31,-11);ctx.lineTo(38,4);ctx.lineTo(44,10);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ffab52';ctx.beginPath();ctx.moveTo(21,0);ctx.lineTo(26,-13);ctx.lineTo(31,0);ctx.fill();
    }else if(this.charIndex===1){
      ctx.fillStyle='#dffbff';
      ctx.beginPath();ctx.moveTo(12,9);ctx.lineTo(28,-18);ctx.lineTo(45,9);ctx.closePath();ctx.fill();
      ctx.fillStyle='#56cdec';ctx.beginPath();ctx.moveTo(20,1);ctx.lineTo(28,-10);ctx.lineTo(35,1);ctx.closePath();ctx.fill();
    }else if(this.charIndex===2){
      ctx.fillStyle='#171a28';roundRect(12,-1,34,18,8);
      ctx.fillStyle='#ffe862';
      ctx.beginPath();ctx.moveTo(17,3);ctx.lineTo(29,-12);ctx.lineTo(27,2);ctx.lineTo(41,-7);ctx.lineTo(34,9);ctx.closePath();ctx.fill();
      ctx.fillStyle='#f4cf35';ctx.beginPath();
      if(this.facing>0){ctx.moveTo(15,20);ctx.lineTo(-12,26);ctx.lineTo(10,34);}
      else{ctx.moveTo(41,20);ctx.lineTo(68,26);ctx.lineTo(46,34);}
      ctx.closePath();ctx.fill();
    }else{
      ctx.fillStyle='#315c2d';roundRect(12,-1,34,19,9);
      ctx.fillStyle='#9bea86';
      ctx.beginPath();ctx.ellipse(18,0,9,16,-.65,0,Math.PI*2);ctx.ellipse(39,1,9,16,.65,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6b8c45';ctx.beginPath();ctx.arc(9,29,12,0,Math.PI*2);ctx.arc(47,29,12,0,Math.PI*2);ctx.fill();
    }

    // eyes
    ctx.fillStyle='#fff';ctx.fillRect(this.facing>0?31:19,9,6,7);
    ctx.fillStyle='#10131b';ctx.fillRect(this.facing>0?34:20,11,3,4);

    // weapon arm and weapon swing
    const shoulderX = this.facing > 0 ? 42 : 14;
    const shoulderY = 31;
    const baseAngle = this.facing > 0 ? -0.55 : Math.PI + 0.55;
    const swingAngle = this.facing > 0 ? swing : -swing;

    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate(baseAngle + swingAngle);

    // arm
    ctx.strokeStyle='#f3c7a5';
    ctx.lineWidth=7;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(17,0);ctx.stroke();

    if(this.charIndex===0){
      // fire sword
      ctx.strokeStyle='#6f331d';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(23,0);ctx.stroke();
      ctx.strokeStyle='#fff0b3';ctx.lineWidth=7;
      ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(52,0);ctx.stroke();
      ctx.strokeStyle='#ff6c3e';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(24,0);ctx.lineTo(54,0);ctx.stroke();
    }else if(this.charIndex===1){
      // ice staff
      ctx.strokeStyle='#b8ecff';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(51,0);ctx.stroke();
      glowOrb(54,0,7,'#d9fbff');
    }else if(this.charIndex===2){
      // kunai
      ctx.fillStyle='#dce6ef';
      ctx.beginPath();ctx.moveTo(17,-5);ctx.lineTo(46,0);ctx.lineTo(17,7);ctx.lineTo(24,0);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#4a4f5a';ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(24,0);ctx.stroke();
    }else{
      // heavy wooden hammer
      ctx.strokeStyle='#73502e';ctx.lineWidth=7;
      ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(45,0);ctx.stroke();
      ctx.fillStyle='#426b39';
      roundRect(40,-12,22,24,6);
      ctx.strokeStyle='#b5df79';ctx.lineWidth=3;ctx.strokeRect(42,-10,18,20);
    }
    ctx.restore();

    // off-hand shield for Gaia
    if(this.charIndex===3){
      ctx.fillStyle='#426b39';ctx.strokeStyle='#b5df79';ctx.lineWidth=3;
      const sx=this.facing>0?8:48;
      ctx.beginPath();ctx.arc(sx,45,13,0,Math.PI*2);ctx.fill();ctx.stroke();
    }

    ctx.restore();

    // attack arc/trail
    if(this.attackT>0){
      ctx.save();
      ctx.globalAlpha=.85;
      ctx.strokeStyle=this.char.accent;
      ctx.lineWidth=8;
      ctx.lineCap='round';
      ctx.beginPath();
      const cx=this.facing>0?47:9;
      const start=this.facing>0?-1.7:Math.PI+1.7;
      const end=this.facing>0?1.0:Math.PI-1.0;
      ctx.arc(cx,34,34,start,end,this.facing<0);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }
}

function startGame(){
  state='play'; result.style.display='none';
  particles=[]; projectiles=[];
  p1=new Fighter(W*.33,0,{left:'a',right:'d',jump:'w',attack:'k',special:'l'},false,1);
  p2=new Fighter(W*.64,2,{left:'arrowleft',right:'arrowright',jump:'arrowup',attack:'n',special:'m'},true,-1);
}
function endGame(win){
  state='result';
  resultText.textContent=win.char.name+' の勝利！';
  result.style.display='flex';
}

function updateProjectiles(){
  for(const pr of projectiles){
    pr.x+=pr.vx; pr.y+=pr.vy; pr.life--;
    const target=pr.owner===p1?p2:p1;
    const box={x:pr.x-pr.r,y:pr.y-pr.r,w:pr.r*2,h:pr.r*2};
    if(pr.life>0&&target.inv<=0&&overlap(box,target)){
      target.percent+=pr.damage;
      const force=7+target.percent*.075*pr.power;
      target.vx=Math.sign(pr.vx)*force; target.vy=-5-target.percent*.024;
      target.stun=9; if(pr.slow)target.slow=pr.slow;
      pr.life=0; shake=9; burst(pr.x,pr.y,28,pr.color);
    }
  }
  projectiles=projectiles.filter(p=>p.life>0&&p.x>-120&&p.x<W+120);
}
function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#17103d');g.addColorStop(.55,'#6046a0');g.addColorStop(1,'#d4a8e8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  for(let i=0;i<70;i++){
    const x=(i*173+time*.035)%W,y=(i*89)%H*.68;
    ctx.fillStyle=i%4===0?'#dff6ff':'#ffffff88';ctx.fillRect(x,y,2,2);
  }
  ctx.fillStyle='#ffffff18';
  for(let i=0;i<5;i++){
    ctx.beginPath();ctx.ellipse(W*(.1+i*.22),H*(.19+(i%2)*.09),90,27,0,0,Math.PI*2);ctx.fill();
  }

  // distant floating islands
  ctx.fillStyle='#33284d';
  for(let i=0;i<4;i++){
    const x=W*(.09+i*.27), y=H*(.35+(i%2)*.09);
    ctx.beginPath();ctx.ellipse(x,y,56,13,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(x-38,y);ctx.lineTo(x,y+55);ctx.lineTo(x+38,y);ctx.fill();
  }
}
function drawStage(){
  for(const p of platforms){
    ctx.fillStyle='#4b3d67';roundRect(p.x,p.y,p.w,p.h,9);
    ctx.fillStyle='#cbb4ff';ctx.fillRect(p.x+8,p.y,p.w-16,5);
    ctx.fillStyle='#2b233d';
    ctx.beginPath();ctx.moveTo(p.x+20,p.y+p.h);ctx.lineTo(p.x+p.w*.5,p.y+p.h+45);ctx.lineTo(p.x+p.w-20,p.y+p.h);ctx.closePath();ctx.fill();
  }
}
function drawProjectiles(){
  for(const p of projectiles){
    glowOrb(p.x,p.y,p.r,p.color);
    if(p.type==='fire'){
      ctx.fillStyle='#ffd15c';ctx.beginPath();ctx.arc(p.x-p.vx*.7,p.y,p.r*.55,0,Math.PI*2);ctx.fill();
    }else if(p.type==='ice'){
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x-p.r,p.y);ctx.lineTo(p.x+p.r,p.y);ctx.stroke();
    }else if(p.type==='vine'){
      ctx.strokeStyle='#315d2b';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(p.x-p.vx*3,p.y+10);ctx.lineTo(p.x,p.y);ctx.stroke();
    }
  }
}
function drawHUD(){
  const touchDevice = matchMedia('(pointer:coarse)').matches;
  const hudBottom = touchDevice ? 118 : 20;
  const hudY = H - hudBottom - 82;
  const panelW = Math.min(230, W * .42);
  const list=[{f:p1,x:18,align:'left'},{f:p2,x:W-18,align:'right'}];

  for(const d of list){
    ctx.textAlign=d.align;
    const bx=d.align==='left'?12:W-panelW-12;
    ctx.fillStyle='#050812d8';
    roundRect(bx,hudY,panelW,76,16);

    ctx.fillStyle=d.f.char.color;
    ctx.font='900 13px system-ui';
    ctx.fillText(d.f.char.title,d.x,hudY+18);

    ctx.fillStyle='#fff';
    ctx.font='900 19px system-ui';
    ctx.fillText(d.f.char.name,d.x,hudY+40);

    ctx.font='900 29px system-ui';
    ctx.fillText(Math.floor(d.f.percent)+'%',d.x,hudY+69);

    ctx.fillStyle=d.f.char.accent;
    ctx.font='800 17px system-ui';
    const stockX=d.align==='left'?Math.min(panelW-20,122):W-Math.min(panelW-20,122);
    ctx.fillText('◆'.repeat(d.f.stocks),stockX,hudY+57);
  }
}
function loop(){
  time++;
  ctx.save();
  if(shake>0){
    ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    shake*=.86;if(shake<.4)shake=0;
  }
  drawBackground();drawStage();

  if(state==='play'){
    p1.update(p2);p2.update(p1);updateProjectiles();
    p1.draw();p2.draw();drawProjectiles();
    for(const p of particles){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;
      ctx.globalAlpha=Math.max(0,p.life/35);ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;
    }
    particles=particles.filter(p=>p.life>0);
    drawHUD();
  }
  ctx.restore();
  requestAnimationFrame(loop);
}

resize();
startGame();
loop();
})();
</script>
