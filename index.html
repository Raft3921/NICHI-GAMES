<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Block Frontier</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#87bfff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none;color:white;text-shadow:0 2px 3px #000}
  #cross{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:700}
  #info{position:absolute;left:12px;top:10px;font-size:14px;line-height:1.45;background:#0008;padding:8px 10px;border-radius:8px}
  #hotbar{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:5px}
  .slot{width:52px;height:52px;border:3px solid #ffffff88;background:#111b;display:grid;place-items:center;border-radius:7px;font-weight:700}
  .slot.sel{border-color:white;transform:translateY(-4px)}
  .swatch{width:28px;height:28px;border:2px solid #fff8}
  #menu{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(#73b8ee,#dff6ff);z-index:5}
  #card{width:min(520px,88vw);background:#18222eea;color:white;padding:28px;border-radius:18px;box-shadow:0 20px 70px #0006;text-align:center}
  h1{margin:0 0 6px;font-size:40px;letter-spacing:.04em}
  p{line-height:1.6;color:#dce8f2}
  button{border:0;border-radius:10px;padding:13px 18px;margin:5px;font-size:16px;font-weight:700;cursor:pointer}
  #start{background:#72d572;color:#102610}
  #new{background:#f0c75e;color:#302000}
  #save{background:#78b7ff;color:#07172a}
  #msg{position:absolute;left:50%;top:20%;transform:translateX(-50%);background:#000b;padding:10px 16px;border-radius:8px;opacity:0;transition:.2s}

  #mobile{position:fixed;inset:0;z-index:4;pointer-events:none;display:none}
  .touch{position:absolute;pointer-events:auto;touch-action:none;user-select:none}
  #stick{left:20px;bottom:28px;width:128px;height:128px;border-radius:50%;background:#ffffff2b;border:3px solid #ffffff88}
  #knob{position:absolute;left:39px;top:39px;width:50px;height:50px;border-radius:50%;background:#ffffffaa}
  #look{right:0;top:0;width:58%;height:72%}
  .action{width:68px;height:68px;border-radius:50%;border:3px solid #ffffff99;background:#111a;color:white;font-size:13px;font-weight:800;display:grid;place-items:center;text-align:center}
  #jump{right:24px;bottom:28px}
  #break{right:105px;bottom:105px}
  #place{right:22px;bottom:120px}
  @media (pointer:coarse){
    #mobile{display:block}
    #info{font-size:12px}
    #hotbar{bottom:8px;transform:translateX(-50%) scale(.76)}
  }

</style>
</head>
<body>
<div id="menu">
  <div id="card">
    <h1>BLOCK FRONTIER</h1>
    <p>オリジナルの3Dブロック・サンドボックス。<br>
    世界を歩き、ブロックを壊し、好きな場所に置いてください。</p>
    <button id="start">ゲーム開始</button>
    <button id="new">新しい世界</button>
    <button id="save">保存</button>
    <p style="font-size:13px">WASD：移動　Space：ジャンプ　左クリック：破壊　右クリック：設置　1〜5：ブロック選択　Esc：メニュー</p>
  </div>
</div>


<div id="mobile">
  <div id="stick" class="touch"><div id="knob"></div></div>
  <div id="look" class="touch"></div>
  <div id="jump" class="touch action">ジャンプ</div>
  <div id="break" class="touch action">こわす</div>
  <div id="place" class="touch action">おく</div>
</div>

<div id="hud">
  <div id="cross">＋</div>
  <div id="info">WASD 移動 / Space ジャンプ<br>左クリック 破壊 / 右クリック 設置<br>1〜5 ブロック選択</div>
  <div id="hotbar"></div>
  <div id="msg"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x79bdf2);
scene.fog = new THREE.Fog(0x79bdf2, 24, 62);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 150);
camera.rotation.order = "YXZ";

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xcfefff,0x51613b,1.8));
const sun = new THREE.DirectionalLight(0xffffff,2.0);
sun.position.set(18,30,12);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-35; sun.shadow.camera.right=35;
sun.shadow.camera.top=35; sun.shadow.camera.bottom=-35;
scene.add(sun);

const BLOCKS = [
  {id:"grass", name:"草", color:0x62a94f},
  {id:"dirt",  name:"土", color:0x86552f},
  {id:"stone", name:"石", color:0x8a8f93},
  {id:"sand",  name:"砂", color:0xdacb88},
  {id:"wood",  name:"木", color:0x9a6537},
];
let selected = 0;
const hotbar = document.querySelector("#hotbar");
function drawHotbar(){
  hotbar.innerHTML="";
  BLOCKS.forEach((b,i)=>{
    const s=document.createElement("div");
    s.className="slot"+(i===selected?" sel":"");
    s.innerHTML=`<div><div class="swatch" style="background:#${b.color.toString(16).padStart(6,"0")}"></div><small>${i+1} ${b.name}</small></div>`;
    s.style.pointerEvents="auto";
    s.addEventListener("click",()=>{selected=i;drawHotbar();});
    hotbar.appendChild(s);
  });
}
drawHotbar();

const geo = new THREE.BoxGeometry(1,1,1);
const materials = Object.fromEntries(BLOCKS.map(b=>[
  b.id,new THREE.MeshLambertMaterial({color:b.color})
]));
const blocks = new Map();
const key = (x,y,z)=>`${x},${y},${z}`;

function addBlock(x,y,z,type="grass",save=true){
  const k=key(x,y,z);
  if(blocks.has(k)) return;
  const mesh=new THREE.Mesh(geo,materials[type]||materials.grass);
  mesh.position.set(x+.5,y+.5,z+.5);
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.userData={x,y,z,type};
  scene.add(mesh);
  blocks.set(k,mesh);
  if(save) scheduleSave();
}
function removeBlock(x,y,z,save=true){
  const k=key(x,y,z), mesh=blocks.get(k);
  if(!mesh) return;
  scene.remove(mesh);
  blocks.delete(k);
  if(save) scheduleSave();
}

function hash2(x,z){
  let n=x*374761393+z*668265263;
  n=(n^(n>>13))*1274126177;
  return ((n^(n>>16))>>>0)/4294967295;
}
function terrainHeight(x,z){
  const h = 3
    + Math.sin(x*.28)*1.1
    + Math.cos(z*.24)*1.0
    + Math.sin((x+z)*.13)*1.2
    + (hash2(x,z)-.5)*1.3;
  return Math.max(1,Math.floor(h));
}
function generateWorld(){
  [...blocks.values()].forEach(m=>scene.remove(m));
  blocks.clear();
  const size=26, half=size/2;
  for(let x=-half;x<half;x++){
    for(let z=-half;z<half;z++){
      const h=terrainHeight(x,z);
      for(let y=0;y<=h;y++){
        let type = y===h ? (h<=2?"sand":"grass") : (y>=h-2?"dirt":"stone");
        addBlock(x,y,z,type,false);
      }
      if(hash2(x+99,z-77)>.93 && h>2){
        for(let y=h+1;y<h+4;y++) addBlock(x,y,z,"wood",false);
      }
    }
  }
  saveWorld();
}

const player={
  pos:new THREE.Vector3(0,9,8),
  vel:new THREE.Vector3(),
  radius:.32,
  height:1.75,
  grounded:false
};
let yaw=0,pitch=0,locked=false;
const keys={};
addEventListener("keydown",e=>{
  keys[e.code]=true;
  if(/^Digit[1-5]$/.test(e.code)){selected=Number(e.code.at(-1))-1;drawHotbar();}
});
addEventListener("keyup",e=>keys[e.code]=false);

renderer.domElement.addEventListener("click",()=>{
  if(!locked) renderer.domElement.requestPointerLock();
});
document.addEventListener("pointerlockchange",()=>{
  if(matchMedia("(pointer:fine)").matches){
    locked=document.pointerLockElement===renderer.domElement;
    document.querySelector("#menu").style.display=locked?"none":"grid";
  }
});
document.addEventListener("mousemove",e=>{
  if(!locked) return;
  yaw -= e.movementX*.0023;
  pitch -= e.movementY*.0023;
  pitch=Math.max(-1.52,Math.min(1.52,pitch));
});
document.addEventListener("contextmenu",e=>e.preventDefault());


const touchMove={x:0,z:0};
let jumpTouch=false;
const stick=document.querySelector("#stick"), knob=document.querySelector("#knob");
function stickUpdate(t){
  const r=stick.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const max=42, len=Math.hypot(dx,dy)||1;
  if(len>max){dx=dx/len*max;dy=dy/len*max;}
  knob.style.transform=`translate(${dx}px,${dy}px)`;
  touchMove.x=dx/max; touchMove.z=dy/max;
}
stick.addEventListener("touchstart",e=>{e.preventDefault();stickUpdate(e.touches[0])},{passive:false});
stick.addEventListener("touchmove",e=>{e.preventDefault();stickUpdate(e.touches[0])},{passive:false});
function stickEnd(){touchMove.x=0;touchMove.z=0;knob.style.transform="translate(0,0)"}
stick.addEventListener("touchend",stickEnd); stick.addEventListener("touchcancel",stickEnd);

let lastLook=null;
const look=document.querySelector("#look");
look.addEventListener("touchstart",e=>{e.preventDefault();lastLook=e.touches[0]},{passive:false});
look.addEventListener("touchmove",e=>{
  e.preventDefault();
  const t=e.touches[0];
  if(lastLook){
    yaw -= (t.clientX-lastLook.clientX)*.006;
    pitch -= (t.clientY-lastLook.clientY)*.006;
    pitch=Math.max(-1.52,Math.min(1.52,pitch));
  }
  lastLook=t;
},{passive:false});
look.addEventListener("touchend",()=>lastLook=null);

const jumpBtn=document.querySelector("#jump");
jumpBtn.addEventListener("touchstart",e=>{e.preventDefault();jumpTouch=true},{passive:false});
jumpBtn.addEventListener("touchend",()=>jumpTouch=false);

const raycaster=new THREE.Raycaster();
raycaster.far=7;
function aim(){
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  return raycaster.intersectObjects([...blocks.values()],false)[0]||null;
}
document.addEventListener("mousedown",e=>{
  if(!locked) return;
  const hit=aim();
  if(!hit) return;
  const d=hit.object.userData;
  if(e.button===0){
    if(d.y>0) removeBlock(d.x,d.y,d.z);
  } else if(e.button===2){
    const n=hit.face.normal;
    const x=d.x+n.x,y=d.y+n.y,z=d.z+n.z;
    if(!playerIntersectsBlock(x,y,z)) addBlock(x,y,z,BLOCKS[selected].id);
  }
});


function mobileAction(place){
  if(!locked) return;
  const hit=aim(); if(!hit) return;
  const d=hit.object.userData;
  if(!place){
    if(d.y>0) removeBlock(d.x,d.y,d.z);
  }else{
    const n=hit.face.normal;
    const x=d.x+n.x,y=d.y+n.y,z=d.z+n.z;
    if(!playerIntersectsBlock(x,y,z)) addBlock(x,y,z,BLOCKS[selected].id);
  }
}
document.querySelector("#break").addEventListener("touchstart",e=>{e.preventDefault();mobileAction(false)},{passive:false});
document.querySelector("#place").addEventListener("touchstart",e=>{e.preventDefault();mobileAction(true)},{passive:false});

function playerIntersectsBlock(x,y,z){
  return player.pos.x+player.radius>x && player.pos.x-player.radius<x+1 &&
         player.pos.y+player.height>y && player.pos.y<y+1 &&
         player.pos.z+player.radius>z && player.pos.z-player.radius<z+1;
}
function collidesAt(px,py,pz){
  const minX=Math.floor(px-player.radius), maxX=Math.floor(px+player.radius);
  const minY=Math.floor(py), maxY=Math.floor(py+player.height-.001);
  const minZ=Math.floor(pz-player.radius), maxZ=Math.floor(pz+player.radius);
  for(let x=minX;x<=maxX;x++)for(let y=minY;y<=maxY;y++)for(let z=minZ;z<=maxZ;z++){
    if(blocks.has(key(x,y,z))) return true;
  }
  return false;
}
function moveAxis(axis,amount){
  if(!amount) return;
  const steps=Math.ceil(Math.abs(amount)/.08);
  const step=amount/steps;
  for(let i=0;i<steps;i++){
    const p=player.pos.clone(); p[axis]+=step;
    if(!collidesAt(p.x,p.y,p.z)) player.pos[axis]+=step;
    else{
      player.vel[axis]=0;
      if(axis==="y"&&step<0) player.grounded=true;
      break;
    }
  }
}
function respawn(){
  player.pos.set(0,10,8);
  player.vel.set(0,0,0);
}

let saveTimer;
function saveWorld(){
  const data=[...blocks.values()].map(m=>m.userData);
  localStorage.setItem("blockFrontierWorld",JSON.stringify(data));
  flash("世界を保存しました");
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveWorld,500);
}
function loadWorld(){
  const raw=localStorage.getItem("blockFrontierWorld");
  if(!raw){generateWorld();return;}
  try{
    [...blocks.values()].forEach(m=>scene.remove(m)); blocks.clear();
    JSON.parse(raw).forEach(b=>addBlock(b.x,b.y,b.z,b.type,false));
  }catch{generateWorld();}
}
function flash(t){
  const el=document.querySelector("#msg");
  el.textContent=t;el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,1200);
}
document.querySelector("#start").onclick=()=>{
  document.querySelector("#menu").style.display="none";
  locked=true;
  if(renderer.domElement.requestPointerLock && matchMedia("(pointer:fine)").matches){
    renderer.domElement.requestPointerLock().catch?.(()=>{});
  }
};
document.querySelector("#new").onclick=()=>{
  localStorage.removeItem("blockFrontierWorld");generateWorld();respawn();
  document.querySelector("#menu").style.display="none";locked=true;
  if(renderer.domElement.requestPointerLock && matchMedia("(pointer:fine)").matches){
    renderer.domElement.requestPointerLock().catch?.(()=>{});
  }
};
document.querySelector("#save").onclick=saveWorld;

const clock=new THREE.Clock();
function update(dt){
  if(!locked) return;
  const forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const wish=new THREE.Vector3();
  if(keys.KeyW) wish.add(forward);
  if(keys.KeyS) wish.sub(forward);
  if(keys.KeyD) wish.add(right);
  if(keys.KeyA) wish.sub(right);
  if(Math.abs(touchMove.z)>.08) wish.addScaledVector(forward,-touchMove.z);
  if(Math.abs(touchMove.x)>.08) wish.addScaledVector(right,touchMove.x);
  if(wish.lengthSq()) wish.normalize();

  const accel=player.grounded?38:14;
  player.vel.x += (wish.x*5.3-player.vel.x)*Math.min(1,accel*dt);
  player.vel.z += (wish.z*5.3-player.vel.z)*Math.min(1,accel*dt);
  player.vel.y -= 20*dt;
  if((keys.Space||jumpTouch)&&player.grounded){player.vel.y=7.4;player.grounded=false;jumpTouch=false;}
  player.grounded=false;
  moveAxis("x",player.vel.x*dt);
  moveAxis("z",player.vel.z*dt);
  moveAxis("y",player.vel.y*dt);
  if(player.pos.y<-12) respawn();

  camera.position.set(player.pos.x,player.pos.y+1.58,player.pos.z);
  camera.rotation.y=yaw; camera.rotation.x=pitch;
}
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  update(dt);
  renderer.render(scene,camera);
}
loadWorld();
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
